<header class="site-header">
  <div class="header-top">
    <!-- Left Side: Language and Search -->
    <div class="utility-left">
      <div class="idioma-selector">
        <span>CAT</span>
        <svg class="icon chevron"><use xlink:href="#chevron-down"></use></svg>
      </div>
      <svg class="icon search"><use xlink:href="#search-icon"></use></svg>
    </div>

    <!-- Center: Logo + Text Title -->
    <div class="header-logo">
      <div class="header-logo">
        <a href="/" class="logo-link">
          <img src="/assets/images/logo.png" alt="Castanya de Viladrau" />
          <span class="logo-title">Castanya de Viladrau</span>
        </a>
      </div>
    </div>

    <!-- Right Side: Shopping Cart -->
    <div class="utility-right">
      <svg class="icon cart"><use xlink:href="#cart-icon"></use></svg>
    </div>
  </div>

  <nav class="header-nav">
    <div class="nav-flex-container">
      <ul class="nav-list">
        <li
          class="nav-item {% if '/visits' in page.url %}active{% endif %} has-dropdown"
        >
          <a href="/visits">VISITES GUIADES</a>
        </li>
        <li class="nav-item {% if '/fusta' in page.url %}active{% endif %}">
          <a href="/fusta">FUSTA</a>
        </li>
        <li
          class="nav-item {% if '/professionals' in page.url %}active{% endif %} has-dropdown nav-item--dropdown"
        >
          <button
            type="button"
            class="nav-link-button"
            aria-expanded="{% if '/professionals' in page.url %}true{% else %}false{% endif %}"
            aria-controls="professionals-submenu"
          >
            ESPAI PROFESSIONALS
          </button>
          <div class="nav-dropdown" id="professionals-submenu">
            <a
              href="/professionals"
              class="nav-dropdown__link {% if page.url == '/professionals/' %}is-active{% endif %}"
              >Perfil sensorial per xefs</a
            >
            <a
              href="/professionals/inspiracio"
              class="nav-dropdown__link {% if '/professionals/inspiracio' in page.url %}is-active{% endif %}"
              >Inspiracio: de xefs per a xefs</a
            >
          </div>
        </li>
        <li
          class="nav-item {% if '/gastronomic' in page.url %}active{% endif %} has-dropdown"
        >
          <a href="/gastronomic">ESPAI GASTRONÒMIC</a>
        </li>
        <li
          class="nav-item {% if '/projecte' in page.url %}active{% endif %} has-dropdown"
        >
          <a href="/projecte">SOBRE EL PROJECTE</a>
        </li>
        <li
          class="nav-item {% if '/trobar-nos' in page.url %}active{% endif %}"
        >
          <a href="/trobar-nos">ON TROBAR-NOS</a>
        </li>
        <li class="nav-item {% if '/blog' in page.url %}active{% endif %}">
          <a href="/blog">ACTUALITAT</a>
        </li>
        <li class="nav-item {% if '/shop' in page.url %}active{% endif %}">
          <a href="/shop/products">BOTIGA</a>
        </li>
      </ul>
    </div>
  </nav>
</header>
